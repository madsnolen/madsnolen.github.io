<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dog Breed Finder</title>
    <link href="css/styles.css" rel="stylesheet">
</head>
<body>
<div class="dogInfo">
        <h1>Dog Breed Finder</h1>
        <p>Enter a dog breed to learn more about it.</p>

    <form id="dogForm">
        <input type="text" id="breed" placeholder="Enter dog breed" class="searchBar">
        <input type="submit" value="Search Dog" class="submitButton">
    </form>

<span id="dogError"></span>

<h2 id="breedName">Dog Breed</h2>
<img id="dogImage" src="img/dog_bones.png" alt="Dog breed image">

<p><strong>Life Span:</strong> <span id="lifeSpan"></span></p>
<p><strong>Weight:</strong> <span id="weight"></span></p>
<p><strong>Energy:</strong> <span id="energy"></span></p>
<p><strong>Shedding:</strong> <span id="shedding"></span></p>
<p><strong>Trainability:</strong> <span id="trainability"></span></p>
</div>

    <script src="js/script.js"></script>

     <footer>
        <hr>
        CST336 Internet Programming. 2026&copy; Nolen <br>
        <figure>
            <img src="img/csumb_logo.png" alt="CSUMB Logo">
        </figure>
    </footer>
    
</body>


</html>
